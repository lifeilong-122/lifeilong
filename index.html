<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuycon Displays</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: radial-gradient(circle at center, #111 0%, #000 80%);
}

.hero h1 {
  font-size:64px;
  font-weight:600;
  letter-spacing:-1px;
}

.hero p {
  color:#aaa;
  margin-top:15px;
  font-size:20px;
}

/* 产品图 */
.hero img {
  width:60%;
  margin-top:40px;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.8));
}

/* ===== SECTION ===== */
.section {
  padding:100px 20px;
  text-align:center;
}

.section h2 {
  font-size:40px;
  margin-bottom:20px;
}

.section p {
  color:#aaa;
}

/* ===== CARDS ===== */
.cards {
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:60px;
}

.card {
  width:280px;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  transition:0.4s;
  opacity:0;
  transform: translateY(40px);
}

.card.visible {
  opacity:1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width:100%;
  margin-bottom:20px;
}

.tag {
  background:#ffffff20;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.spec {
  margin-top:15px;
  font-size:20px;
  font-weight:600;
}

/* 推荐高亮 */
.highlight {
  border:1px solid #fff;
  background: rgba(255,255,255,0.08);
}

/* ===== BUTTON ===== */
.button {
  margin-top:20px;
  padding:10px 20px;
  background:#fff;
  color:#000;
  border-radius:20px;
  display:inline-block;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero h1 { font-size:40px; }
  .hero img { width:90%; }
}
</style>

</head>

<body>

<!-- HERO -->

<section class="hero">
  <h1>Kuycon Displays</h1>
  <p>Choose your perfect screen</p>
  <img src="https://via.placeholder.com/1200x600" alt="monitor">
</section>

<!-- SECTION -->

<section class="section">
  <h2>Compare Models</h2>
  <p>Designed for creators, professionals, and gamers</p>

  <div class="cards">

```
<div class="card">
  <img src="https://via.placeholder.com/300x200">
  <h3>G27P</h3>
  <div class="tag">5K Retina</div>
  <div class="spec">Best for Mac & Design</div>
</div>

<div class="card highlight">
  <img src="https://via.placeholder.com/300x200">
  <h3>G32P</h3>
  <div class="tag">6K Pro</div>
  <div class="spec">Ultimate Productivity</div>
  <div class="button">Recommended</div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300x200">
  <h3>Q32S</h3>
  <div class="tag">4K OLED 240Hz</div>
  <div class="spec">Gaming Beast</div>
</div>
```

  </div>
</section>

<script>
// 滚动动画
const cards = document.querySelectorAll('.card');

function showCards() {
  const trigger = window.innerHeight * 0.85;

  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < trigger){
      card.classList.add('visible');
    }
  });
}

window.addEventListener('scroll', showCards);
</script>

</body>
</html>
